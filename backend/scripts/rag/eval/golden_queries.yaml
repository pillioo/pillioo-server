# filter excludes sop entirely so missing_document_types is deterministic.
- id: shortage_missing_sop_evidence_insufficient
  query: "What inventory allocation steps apply during a drug shortage?"
  top_k: 5
  filter: 'document_type == "policy" and section == "required_actions"'
  context:
    event_type: shortage
  expected:
    any_hit:
      document_type: policy
      event_type: shortage
    set:
      required_document_types:
        - policy
      min_evidence_count: 1
      must_have_citations: true
    sufficiency:
      evidence_status: insufficient
      missing_document_types:
        - sop

