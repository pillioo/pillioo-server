# ndc is reranker-only, not a hard filter; proves the ndc_match boost works.
- id: ndc_exact_match_recall_identifier_retrieval
  query: "What is the reason for the superpotent lidocaine recall, NDC 52565-009-50?"
  top_k: 5
  context:
    event_type: recall
    normalized_drug_name: lidocaine
    ndc:
      - "52565-009-50"
  expected:
    any_hit:
      document_type: recall_notice
      event_type: recall
      recall_number: D-0280-2022
      content_contains:
        - superpotent
      matched_identifiers:
        ndc:
          - "52565-009-50"
    set:
      required_document_types:
        - recall_notice
        - policy
        - sop
      min_evidence_count: 3
      must_have_citations: true

