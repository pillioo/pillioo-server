- id: fentanyl_recall_reason
  query: "Find the reason for the 2024 superpotent fentanyl Class I recall."
  top_k: 5
  filter: 'document_type == "recall_notice" and normalized_drug_name == "fentanyl"'
  expected:
    any_hit:
      document_type: recall_notice
      event_type: recall
      recall_number: D-0277-2024
      classification: class_i
      content_contains:
        - superpotent
    set:
      required_document_types:
        - recall_notice
      min_evidence_count: 1
      must_have_citations: true

- id: piperacillin_tazobactam_label
  query: "What label evidence is available for piperacillin tazobactam?"
  top_k: 5
  filter: 'document_type == "label" and rxnorm_rxcui == "74169"'
  expected:
    any_hit:
      document_type: label
      event_type: label_update
      rxnorm_rxcui: "74169"
    set:
      required_document_types:
        - label
      min_evidence_count: 1
      must_have_citations: true

- id: warfarin_warning_or_contraindication
  query: "What warnings or contraindications are relevant for warfarin sodium?"
  top_k: 5
  filter: 'document_type == "label" and rxnorm_rxcui == "114194"'
  expected:
    any_hit:
      document_type: label
      event_type: label_update
      normalized_drug_name: warfarin sodium
      any_section:
        - warnings
        - contraindications
        - boxed_warning
    set:
      required_document_types:
        - label
      required_sections:
        - warnings
        - contraindications
      min_evidence_count: 2
      must_have_citations: true

- id: missing_recall_evidence_policy
  query: "What escalation policy applies when a required recall notice is missing?"
  top_k: 5
  filter: 'document_type == "policy" and section == "escalation_criteria"'
  expected:
    any_hit:
      document_id: policy-evidence-insufficiency-escalation
      document_type: policy
      event_type: recall
      section: escalation_criteria
      content_contains:
        - required recall notice is missing
    set:
      required_document_types:
        - policy
      required_sections:
        - escalation_criteria
      min_evidence_count: 1
      must_have_citations: true

# The four entries above all pin an explicit `filter:`, so RetrievalService's
# filter_override path handles them end-to-end and the EvidenceRouter/
# MetadataFilterBuilder fallback logic never runs. The two entries below omit
# `filter:` so retrieval is driven purely by event_type + identifiers, the way
# a real workflow call would use it.
- id: fentanyl_recall_router_coverage
  query: "Find the reason for the 2024 superpotent fentanyl Class I recall."
  top_k: 5
  expected:
    any_hit:
      document_type: recall_notice
      event_type: recall
      recall_number: D-0277-2024
      classification: class_i
      content_contains:
        - superpotent
    set:
      required_document_types:
        - recall_notice
        - policy
        - sop
      min_evidence_count: 3
      must_have_citations: true

- id: piperacillin_label_router_coverage
  query: "What label evidence is available for piperacillin tazobactam?"
  top_k: 5
  expected:
    any_hit:
      document_type: label
      event_type: label_update
      rxnorm_rxcui: "74169"
    set:
      required_document_types:
        - label
        - policy
        - sop
      min_evidence_count: 3
      must_have_citations: true
